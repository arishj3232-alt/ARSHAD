kind = "web"
previewPath = "/"
title = "OnlyTwo"
version = "1.0.0"
id = "artifacts/only-two"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24326

[services.development]
run = "pnpm --filter @workspace/only-two run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/only-two", "run", "build" ]
publicDir = "artifacts/only-two/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24326"
BASE_PATH = "/"
